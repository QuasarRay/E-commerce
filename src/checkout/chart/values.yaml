# Default values for checkout.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# ----------------------------------------------------------------------------
# WORKLOAD REPLICA CONFIGURATION
# ----------------------------------------------------------------------------
replicaCount: 3

# ----------------------------------------------------------------------------
# IMAGE CONFIGURATION
# ----------------------------------------------------------------------------
image:
  repository: # <aws-account-id>.dkr.ecr.us-east-1.amazonaws.com/retail-store/checkout
  pullPolicy: IfNotPresent
  tag: 

# ----------------------------------------------------------------------------
# METADATA
# ----------------------------------------------------------------------------
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

# ----------------------------------------------------------------------------
# SERVICE ACCOUNT
# ----------------------------------------------------------------------------
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

podAnnotations: {}

# ----------------------------------------------------------------------------
# SECURITY
# ----------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# ----------------------------------------------------------------------------
# SERVICE
# ----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80

# ----------------------------------------------------------------------------
# RESOURCE MANAGEMENT
# ----------------------------------------------------------------------------
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 128m
    memory: 256Mi

# ----------------------------------------------------------------------------
# AUTOSCALING - HORIZONTAL POD AUTOSCALER (HPA)
# ----------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ----------------------------------------------------------------------------
# SCHEDULING
# ----------------------------------------------------------------------------
nodeSelector: {}

tolerations: []

affinity: {}

# ----------------------------------------------------------------------------
# TOPOLOGY SPREAD CONSTRAINTS
# ----------------------------------------------------------------------------
# Distribute pods across nodes AND availability zones for high availability
topologySpreadConstraints: []

# ----------------------------------------------------------------------------
# METRICS
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8080'
    prometheus.io/path: '/metrics'

# ----------------------------------------------------------------------------
# CONFIG MAP
# ----------------------------------------------------------------------------
configMap:
  create: true
  name:

# ----------------------------------------------------------------------------
# APPLICATION CONFIGURATION
# ----------------------------------------------------------------------------
app:
  persistence:
    provider: 'in-memory'
    redis:
      endpoint: ''

  endpoints:
    orders: ''

# ----------------------------------------------------------------------------
# DATABASE
# ----------------------------------------------------------------------------
redis:
  create: false

  image:
    repository: redis
    pullPolicy: IfNotPresent
    tag: '6.0-alpine'

  service:
    type: ClusterIP
    port: 6379

  podAnnotations: {}

  nodeSelector: {}

  tolerations: []

  affinity: {}

# ----------------------------------------------------------------------------
# SECURITY GROUPS
# ----------------------------------------------------------------------------
securityGroups:
  create: false

  securityGroupIds: []

# ----------------------------------------------------------------------------
# OPEN TELEMETRY
# ----------------------------------------------------------------------------
opentelemetry:
  enabled: true
  instrumentation: ''

# ----------------------------------------------------------------------------
# POD DISRUPTION BUDGET (PDB)
# ----------------------------------------------------------------------------
# Maintain minimum availability during voluntary disruptions (node drains, etc.)
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
