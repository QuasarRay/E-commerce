name: Build and Push Catalog Service to ECR

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]
    paths:
      - "src/catalog"
      #- ".github/workflows/build-push-catalog.yaml" # During testing phases only for prod comment this line

permissions:
  id-token: write # Needed for OIDC
  contents: write # Needed to push commits

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: retail-store/catalog

jobs:
  build-and-push-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-catalog
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: vars
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "IMAGE_SHA=$IMAGE_BASE:$SHA_TAG" >> $GITHUB_ENV
          echo "IMAGE_LATEST=$IMAGE_BASE:latest" >> $GITHUB_ENV
          echo "Using tags: latest and $SHA_TAG"

      - name: Build and push Docker images
        run: |
          docker build \
            -t "$IMAGE_SHA" \
            -t "$IMAGE_LATEST" \
            src/ui

          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
      
      - name: Setup Git auth using GITHUB_TOKEN
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email ""
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Update Helm values file with new image tag
        run: |
          cd src/catalog
          git config user.name "ci-bot"
          git config user.email ""
          sed -i "s|^  tag: .*|  tag: sha-${GITHUB_SHA::7}|" chart/values-catalog.yaml
          git diff --quiet || (
            git add chart/values-catalog.yaml
            git commit -m "Update Catalog image tag to sha-${GITHUB_SHA::7}"
            git push origin main
          )

      - name: CI Complete
        run: |
          echo "Image push and Git update done"
          echo "Images pushed:"
          echo "$IMAGE_SHA"
          echo "$IMAGE_LATEST"
